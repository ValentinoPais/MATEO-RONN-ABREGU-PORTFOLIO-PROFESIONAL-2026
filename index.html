<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mateo Ronn Abregu — Fotógrafo</title>
  <meta name="description" content="Fotógrafo especializado en shows, moda y fotografía social. Buenos Aires." />
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ─── Variables ─── */
    :root {
      --bg: #0d0d0d;
      --bg2: #111111;
      --text: #e8e8e8;
      --muted: #999;
      --accent: #e8e8e8;
      --nav-h: 80px;
      --nav-space: 80px; /* alto real del nav (en celu son 2 renglones); lo ajusta el JS */
      --font: 'Adobe Garamond', Times, serif;
      --font-display: 'Bebas Neue', sans-serif;
    }

    /* ─── Base ─── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── Nav ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: text-shadow 0.3s ease, color 0.3s ease;
    }

    .nav-logo:hover { color: var(--text); }
    .nav-links a:hover { color: var(--text); }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }


    /* hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--text);
      transition: 0.3s;
    }

    /* mobile menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      background: var(--bg);
      padding: 24px 40px 32px;
      border-bottom: 1px solid #1a1a1a;
      z-index: 99;
    }
    .mobile-menu.open { display: block; }
    .mobile-menu a {
      font-family: var(--font-display);
      display: block;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .mobile-menu a:last-child { border-bottom: none; }

    /* ─── Main wrapper ─── */
    main {
      padding-top: var(--nav-space);
    }

    /* ─── Section titles ─── */
    .section-label {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      padding: 44px 20px 14px;
      scroll-margin-top: var(--nav-space);
    }

    .empty-message {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      padding: 120px 40px;
    }

    /* ─── Artist / production gallery (filas justificadas, estilo Flickr) ───
       Cada fila la arma el JS (justify): misma altura, ancho de cada portada
       según su proporción real. Por eso ya no se recorta nada. ───────────── */
    .jgrid {
      display: flex;
      flex-direction: column;
      gap: 10px;            /* el JS lo ajusta por pantalla */
      padding: 0 20px;
    }
    .jrow {
      display: flex;
      justify-content: center; /* centra la última fila incompleta (las llenas no tienen hueco) */
      gap: 10px;            /* el JS lo ajusta por pantalla */
      /* la altura de cada fila la fija el JS */
    }

    .artist-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      min-width: 0;         /* deja que el flex controle el ancho (no el contenido) */
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .artist-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
      filter: brightness(0.88) saturate(0.9);
      pointer-events: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
    }

    @media (hover: hover) {
      .artist-card:hover img {
        transform: scale(1.05);
      }
    }

    @keyframes lb-flash {
      0%   { filter: brightness(0.88) saturate(0.9); transform: scale(1); }
      25%  { filter: brightness(1.3) saturate(0.9); transform: scale(1.05); }
      100% { filter: brightness(0.88) saturate(0.9); transform: scale(1); }
    }
    .artist-card.lb-flash img {
      animation: lb-flash 0.9s ease forwards;
    }

    .artist-name {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 18px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      pointer-events: none;
    }

    /* En mouse/desktop el nombre queda oculto y aparece (con su difuminado
       de contraste) solo al pasar el mouse — así no tapa la foto.
       En touch no hay hover real, así que se mantiene siempre visible. */
    @media (hover: hover) {
      .artist-name {
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      .artist-card:hover .artist-name {
        opacity: 1;
      }
    }


    /* ─── About section ─── */
    #about {
      margin-top: 80px;
      padding: 0 40px;
    }

    .about-text {
      max-width: 640px;
      margin: 0 auto;
    }

    #about h2 {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    #about p {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      line-height: 1.7;
      color: #d0d0d0;
      margin-bottom: 16px;
      white-space: pre-line; /* respeta los saltos de línea de about.txt */
    }
    #about p:last-child { margin-bottom: 0; }

    /* ─── Footer / Contacto (siempre visible, línea a todo el ancho) ─── */
    .contact-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
      margin-top: 80px;
      padding: 28px 40px;
      border-top: 1px solid #1a1a1a;
    }

    .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .contact-info a {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--text);
      transition: color 0.2s;
    }
    .contact-info a[href^="https"]:hover { color: var(--muted); }

    .footer-name {
      font-family: var(--font-display);
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
    }

    /* ─── Loader ─── */
    body.loading { overflow: hidden; }
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loader-name {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(to right, #e8e8e8 var(--p, 0%), #333 var(--p, 0%));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: --p 0.2s ease;
    }

    /* ─── Lightbox ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }

    #lb-track {
      position: absolute;
      top: 0; left: 0;
      width: 300vw;
      height: 100%;
      display: flex;
      align-items: center;
      transform: translateX(-100vw);
      will-change: transform;
    }

    .lb-slide {
      width: 100vw;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #000;
    }

    .lb-slide img {
      max-width: 90vw;
      max-height: min(88vh, calc(100vh - 96px));
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      display: block;
      transition: opacity 0.25s ease;
    }
    /* Imagen oculta mientras no está decodificada. transition:none hace que la
       foto ANTERIOR desaparezca al instante en vez de "fundirse" durante 0.25s
       mientras se carga la nueva — ese fundido de la foto vieja era el flash. */
    .lb-slide img.lb-img-loading { opacity: 0 !important; transition: none !important; }

    .lightbox-title {
      position: fixed;
      top: 28px; left: 32px;
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 201;
      pointer-events: none;
    }

    /* ─── Loader minimalista (carga de imagen del lightbox) ─── */
    .lb-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 56px;
      height: 56px;
      margin: -28px 0 0 -28px;
      border-radius: 14px;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 199;
    }
    .lb-loader::after {
      content: '';
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.75);
    }
    .lb-loader.show {
      opacity: 1;
    }
    .lb-loader.show::after {
      animation: lb-spin 0.85s linear infinite;
    }
    @keyframes lb-spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Filmstrip (lightbox thumbnail strip) ─── */
    #lb-filmstrip {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(calc(100% + 40px));
      display: flex;
      gap: 8px;
      max-width: 92vw;
      overflow-x: auto;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(20,20,20,0.55);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      z-index: 203;
      scrollbar-width: none;
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #lb-filmstrip.visible {
      transform: translateX(-50%) translateY(0);
    }
    #lb-filmstrip::-webkit-scrollbar { display: none; }
    #lb-filmstrip.hidden { display: none; }

    .lb-thumb {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      object-fit: cover;
      cursor: pointer;
      border-radius: 3px;
      opacity: 0.45;
      filter: brightness(0.75) saturate(0.8);
      pointer-events: auto;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      transition: opacity 0.2s ease, filter 0.2s ease, transform 0.2s ease;
    }
    .lb-thumb.active {
      opacity: 1;
      filter: brightness(1.05) saturate(1.15);
      transform: scale(1.15);
    }
    @media (hover: hover) {
      .lb-thumb:not(.active):hover { opacity: 0.8; }
    }

    .lightbox-close {
      position: fixed;
      top: 24px; right: 32px;
      font-size: 28px;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      background: none;
      border: none;
      transition: color 0.2s;
      z-index: 201;
    }
    .lightbox-close:hover { color: var(--text); }

    .lightbox-zone {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 202;
      cursor: pointer;
      padding: 120px 24px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .lightbox-zone.prev { left: 0; padding-left: max(24px, calc(5vw - 40px)); }
    .lightbox-zone.next { right: 0; padding-right: max(24px, calc(5vw - 40px)); }
    .lightbox-zone.hidden { display: none; }
    .lightbox-zone:hover { background: rgba(255,255,255,0.08); }

    .lightbox-caret {
      font-size: 32px;
      color: var(--muted);
      font-style: normal;
      line-height: 1;
      transition: color 0.2s, transform 0.2s;
      pointer-events: none;
      user-select: none;
      display: block;
    }
    .lightbox-zone:hover .lightbox-caret {
      color: #fff;
      transform: scale(1.3);
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .jgrid { padding: 0 16px; }
    }

    @media (max-width: 600px) {
      /* Nav en dos renglones: el nombre arriba y las secciones visibles justo
         debajo (antes quedaban escondidas en el menú hamburguesa). */
      nav {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 16px 10px;
        row-gap: 8px;
      }
      .nav-logo {
        flex-basis: 100%;
        text-align: center;
        font-size: 30px;
      }
      .nav-links {
        display: flex;
        flex-basis: 100%;
        min-width: 0;
        flex-wrap: nowrap;
        gap: 18px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      /* Centradas si entran; si son muchas y no entran, se deslizan con el dedo
         (igual que el filmstrip de miniaturas del lightbox). */
      .nav-links::before,
      .nav-links::after { content: ''; margin: auto; }
      .nav-links::-webkit-scrollbar { display: none; }
      .nav-links li { flex-shrink: 0; }
      .nav-links a { font-size: 16px; white-space: nowrap; }
      .hamburger { display: none; }
      .jgrid { padding: 0 10px; }
      .artist-name { display: none; }
      .lightbox-title { top: 22px; left: 20px; font-size: 13px; }
      #lb-filmstrip { bottom: 14px; gap: 6px; padding: 8px 10px; }
      .lb-thumb { width: 38px; height: 38px; }
      .section-label { font-size: 21px; padding: 34px 10px 10px; }
      #about { padding: 0 20px; margin-top: 60px; }
      .contact-row { margin-top: 60px; padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader"><span id="loader-name">Mateo Ronn Abregu</span></div>

  <!-- Nav -->
  <nav>
    <a href="#" class="nav-logo" id="navLogo" onclick="logoClick(event)">Mateo Ronn Abregu</a>
    <ul class="nav-links" id="navLinks"></ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu"></div>

  <main>

    <!-- Secciones generadas dinámicamente desde Drive (o datos de respaldo) -->
    <div id="dynamicSections"></div>

    <!-- ── About ──────────────────────────────────────────────────────
         El texto sale del archivo "about.txt" en la carpeta PRINCIPAL de
         Drive (mismo sistema que las carpetas de fotos, pero para texto).
         · Con texto  → se muestra esta sección con ese texto.
         · Vacío / no existe → la sección queda oculta y se saca del menú.
         Lo llena el JS (loadAboutText/renderAbout). ───────────────────── -->
    <section id="about" hidden>
      <div class="about-text">
        <h2>About</h2>
        <p id="aboutText"></p>
      </div>
    </section>

    <!-- ── Footer / Contacto (SIEMPRE visible, no depende de about.txt) ── -->
    <footer class="contact-row">
      <div class="contact-info">
        <a href="mailto:mateoron33@gmail.com">mateoron33@gmail.com</a>
        <a href="https://instagram.com/ronnfotografia_" target="_blank" rel="noopener">@ronnfotografia_</a>
      </div>
      <span class="footer-name">© 2026 Mateo Ronn Abregu</span>
    </footer>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <p class="lightbox-title" id="lbTitle"></p>
    <div class="lb-loader" id="lbLoader"></div>
    <div class="lightbox-zone prev" id="lbPrev" onclick="lbNavBtn(-1)"><span class="lightbox-caret">&#8249;</span></div>
    <div id="lb-track">
      <div class="lb-slide"><img id="lb-img-left" src="" alt="" /></div>
      <div class="lb-slide"><img id="lightboxImg" src="" alt="" /></div>
      <div class="lb-slide"><img id="lb-img-right" src="" alt="" /></div>
    </div>
    <div class="lightbox-zone next" id="lbNext" onclick="lbNavBtn(1)"><span class="lightbox-caret">&#8250;</span></div>
    <div id="lb-filmstrip"></div>
  </div>

  <script>
    /* ════════════════════════════════════════════════════════════
       CONFIGURACIÓN DE GOOGLE DRIVE
       ════════════════════════════════════════════════════════════
       Completá estos dos valores (ver GUIA_crear_api_key_google_drive.txt)
       y poné enabled: true para que la página cargue todo desde Drive. */
    const DRIVE_CONFIG = {
      enabled: true,
      apiKey: 'AIzaSyDZ2okaUjD6fll__OAX3qMQmTJem0uSYxE',
      rootFolderId: '1i5ds2rvrHKU8RHBQ4mhn6rR3dgk0tQ31',
    };

    /* ─── Helpers de Google Drive ─── */
    function driveImageUrl(fileId, size) {
      return `https://drive.google.com/thumbnail?id=${fileId}&sz=w${size || 1600}`;
    }

    // Reescribe el tamaño (sz=wN) de una URL de Drive ya generada — para pedir
    // una versión liviana (miniatura) en vez de la de máxima resolución.
    function driveThumbUrl(src, size) {
      return src.replace(/sz=w\d+/, 'sz=w' + size);
    }

    // Saca prefijos numéricos de orden: "1 - Skrillex" / "01_Skrillex" → "Skrillex"
    function cleanDriveName(name) {
      return name.replace(/^\s*\d+[\s_\-.]*/, '').trim() || name;
    }

    function slugify(str) {
      const accents = { 'á':'a','é':'e','í':'i','ó':'o','ú':'u','ñ':'n','ü':'u' };
      return str.toLowerCase()
        .split('').map(ch => accents[ch] || ch).join('')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-+|-+$)/g, '') || 'seccion';
    }

    async function driveListChildren(folderId, opts) {
      opts = opts || {};
      let q = `'${folderId}' in parents and trashed = false`;
      if (opts.foldersOnly) q += ` and mimeType = 'application/vnd.google-apps.folder'`;
      if (opts.imagesOnly)  q += ` and mimeType contains 'image/'`;
      // Para imágenes pedimos también su ancho/alto real (imageMediaMetadata):
      // así la grilla justificada conoce las proporciones antes de cargar las
      // fotos y no hay "salto" de layout.
      const fields = opts.imagesOnly
        ? 'files(id,name,imageMediaMetadata(width,height))'
        : 'files(id,name)';
      const url = 'https://www.googleapis.com/drive/v3/files'
        + `?q=${encodeURIComponent(q)}`
        + `&orderBy=name_natural`
        + `&fields=${fields}`
        + `&pageSize=300`
        + `&key=${DRIVE_CONFIG.apiKey}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Drive API respondió ' + res.status);
      const data = await res.json();
      return data.files || [];
    }

    async function loadSectionsFromDrive() {
      const sectionFolders = await driveListChildren(DRIVE_CONFIG.rootFolderId, { foldersOnly: true });

      // Antes esto era secuencial: se esperaba (await) carpeta por carpeta, una
      // tras otra, así que el tiempo de carga crecía con CADA carpeta nueva que
      // Mateo agregaba en Drive (1 + secciones + artistas pedidos en fila).
      // Ahora se piden todas en paralelo con Promise.all: la espera total pasa
      // a ser ~la del nivel más lento, no la suma de todas. Promise.all conserva
      // el orden del array, así que el orden de Drive (orderBy=name_natural) se
      // respeta igual.
      const sections = await Promise.all(sectionFolders.map(async (sf) => {
        const label = cleanDriveName(sf.name);
        const id = slugify(label);
        const artistFolders = await driveListChildren(sf.id, { foldersOnly: true });

        const artists = (await Promise.all(artistFolders.map(async (af) => {
          const files = await driveListChildren(af.id, { imagesOnly: true });
          if (!files.length) return null;
          const meta = files[0].imageMediaMetadata || {}; // dims de la PORTADA (1ra foto)
          return {
            name: cleanDriveName(af.name),
            images: files.map(f => driveImageUrl(f.id)),
            coverW: meta.width || null,
            coverH: meta.height || null,
          };
        }))).filter(Boolean);

        return artists.length ? { id, label, artists } : null;
      }));

      return sections.filter(Boolean);
    }

    async function loadSectionsData() {
      if (!DRIVE_CONFIG.enabled) return [];
      try {
        return await loadSectionsFromDrive();
      } catch (err) {
        console.error('No se pudo cargar la galería desde Drive.', err);
        return [];
      }
    }

    /* ─── About: lee el texto de presentación desde la carpeta principal ───
       Soporta DOS formatos en Drive (lo que esté primero):
         • Un "Documento de Google" llamado  about      (lo natural y fácil de editar)
         • Un archivo de texto común llamado about.txt
       Si no existe, está vacío, o falla la lectura → devuelve '' (About oculto).
       Usa la misma API key de solo-lectura que el resto de la página. */
    async function loadAboutText() {
      if (!DRIVE_CONFIG.enabled) return '';
      try {
        // 1) Buscar el archivo "about" (Doc) o "about.txt" en la carpeta principal.
        const q = `'${DRIVE_CONFIG.rootFolderId}' in parents and trashed = false`
          + ` and (name = 'about' or name = 'about.txt')`
          + ` and mimeType != 'application/vnd.google-apps.folder'`;
        const listUrl = 'https://www.googleapis.com/drive/v3/files'
          + `?q=${encodeURIComponent(q)}`
          + `&fields=files(id,name,mimeType)`
          + `&orderBy=name`
          + `&pageSize=1`
          + `&key=${DRIVE_CONFIG.apiKey}`;
        const listRes = await fetch(listUrl);
        if (!listRes.ok) throw new Error('Drive API respondió ' + listRes.status);
        const file = ((await listRes.json()).files || [])[0];
        if (!file) return ''; // no existe → About oculto (se trata como vacío)

        // 2) Bajar el texto. Un Documento de Google NO tiene "bytes" descargables:
        //    se EXPORTA a texto plano. Un .txt común se baja directo con alt=media.
        const isGoogleDoc = file.mimeType === 'application/vnd.google-apps.document';
        const contentUrl = isGoogleDoc
          ? `https://www.googleapis.com/drive/v3/files/${file.id}/export?mimeType=text/plain&key=${DRIVE_CONFIG.apiKey}`
          : `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${DRIVE_CONFIG.apiKey}`;
        const contentRes = await fetch(contentUrl);
        if (!contentRes.ok) throw new Error('No se pudo leer el About (' + contentRes.status + ')');
        const text = await contentRes.text();
        // Saca el BOM inicial (U+FEFF) que a veces agrega el export y normaliza los saltos de línea.
        const noBom = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
        return noBom.replace(/\r\n/g, '\n').trim();
      } catch (err) {
        console.error('No se pudo cargar el About desde Drive.', err);
        return '';
      }
    }

    /* ─── Render: secciones, grillas de portadas y nav ─── */
    let firstSectionId = null;
    let aboutHasText = false; // lo define renderAbout() según el contenido de about.txt

    function buildNav(sections) {
      const navLinks = document.getElementById('navLinks');
      const mobileMenu = document.getElementById('mobileMenu');
      navLinks.innerHTML = '';
      mobileMenu.innerHTML = '';
      // "About" solo aparece en el menú si about.txt tiene texto (igual que las
      // secciones: si no hay contenido, no se muestra el botón).
      const entries = sections.map(s => ({ id: s.id, label: s.label }));
      if (aboutHasText) entries.push({ id: 'about', label: 'About' });
      entries.forEach(entry => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + entry.id;
        a.textContent = entry.label;
        li.appendChild(a);
        navLinks.appendChild(li);

        const a2 = document.createElement('a');
        a2.href = '#' + entry.id;
        a2.textContent = entry.label;
        a2.addEventListener('click', toggleMenu);
        mobileMenu.appendChild(a2);
      });
    }

    /* ─── Galería justificada (estilo Flickr / Google Photos) ──────────────
       Agrupa las portadas en filas de igual altura; el ancho de cada portada
       sale de su proporción REAL, y la fila se estira para llenar el ancho.
       Resultado: nada se recorta y las horizontales ocupan más que las
       verticales. La última fila solo se estira si está bastante completa
       (si no, queda a la altura objetivo y alineada a la izquierda, para que
       una sola foto no se agrande de forma exagerada). ───────────────────── */

    function justifyParams() {
      const w = window.innerWidth;
      if (w <= 600) return { targetH: 270, gap: 6 };   // ~+35% (antes 200)
      if (w <= 900) return { targetH: 350, gap: 8 };   // ~+35% (antes 260)
      return { targetH: 405, gap: 10 };                // ~+35% (antes 300)
    }

    function gridUsableWidth(grid) {
      const cs = getComputedStyle(grid);
      return grid.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    }

    // Reparte las cards guardadas en grid._cards ([{el, ar}]) en filas justificadas.
    function justifyGrid(grid) {
      const cards = grid._cards;
      if (!cards || !cards.length) return;
      const { targetH, gap } = justifyParams();
      const W = gridUsableWidth(grid);
      if (W <= 0) return;

      grid.style.gap = gap + 'px';
      grid.innerHTML = ''; // reconstruimos las filas (las cards son los MISMOS nodos)

      let row = [], sumAR = 0;
      const flush = (isLast) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'jrow';
        rowEl.style.gap = gap + 'px';
        const gaps = gap * (row.length - 1);
        const hFull = (W - gaps) / sumAR;                 // altura para llenar el ancho
        // Filas completas: siempre se estiran. Última fila: solo si no se agranda
        // de más (hasta 1.4× la altura objetivo); si no, altura objetivo sin estirar.
        const stretch = !isLast || hFull <= targetH * 1.4;
        row.forEach(it => {
          it.el.style.height = '100%';
          if (stretch) { it.el.style.flex = it.ar + ' 0 0'; it.el.style.width = ''; }
          else { it.el.style.flex = '0 0 auto'; it.el.style.width = (it.ar * targetH) + 'px'; }
          rowEl.appendChild(it.el);
        });
        rowEl.style.height = (stretch ? hFull : targetH) + 'px';
        grid.appendChild(rowEl);
      };

      cards.forEach(it => {
        row.push(it);
        sumAR += it.ar;
        const naturalW = sumAR * targetH + gap * (row.length - 1);
        if (naturalW >= W) { flush(false); row = []; sumAR = 0; }
      });
      if (row.length) flush(true);
    }

    function justifyAll() {
      document.querySelectorAll('.jgrid').forEach(justifyGrid);
    }

    // Recalcular en resize / cambio de orientación, con un pequeño debounce.
    let justifyTimer = null;
    function scheduleJustify() {
      clearTimeout(justifyTimer);
      justifyTimer = setTimeout(justifyAll, 120);
    }
    window.addEventListener('resize', scheduleJustify);

    function renderSections(sections) {
      const container = document.getElementById('dynamicSections');
      container.innerHTML = '';

      if (!sections || !sections.length) {
        firstSectionId = null;
        const empty = document.createElement('p');
        empty.className = 'empty-message';
        empty.textContent = 'Todavía no hay nada para mostrar.';
        container.appendChild(empty);
        buildNav([]);
        return;
      }

      firstSectionId = sections[0] ? sections[0].id : null;

      sections.forEach(section => {
        const labelEl = document.createElement('p');
        labelEl.className = 'section-label';
        labelEl.id = section.id;
        labelEl.textContent = section.label;
        container.appendChild(labelEl);

        const grid = document.createElement('div');
        grid.className = 'jgrid';
        grid._cards = [];
        container.appendChild(grid);

        section.artists.forEach((artist, idx) => {
          if (!artist.images || !artist.images.length) return;
          const card = document.createElement('div');
          card.className = 'artist-card';

          const img = document.createElement('img');
          img.src = artist.images[0];
          img.alt = artist.name;
          if (idx >= 4) img.loading = 'lazy';

          const name = document.createElement('span');
          name.className = 'artist-name';
          name.textContent = artist.name;

          card.appendChild(img);
          card.appendChild(name);
          card.addEventListener('click', () => openArtistLightbox(artist));

          artist.cardEl = card;

          // Proporción inicial: la que dio Drive (imageMediaMetadata). Si no hay,
          // arrancamos con 1.5 provisorio y la corregimos al cargar la imagen.
          const item = {
            el: card,
            ar: (artist.coverW && artist.coverH) ? (artist.coverW / artist.coverH) : 1.5,
          };
          grid._cards.push(item);

          // Al cargar el thumbnail usamos su proporción REAL (cubre EXIF/rotación
          // o portadas sin metadata) y, si cambió, reacomodamos las filas.
          const fixAR = () => {
            if (img.naturalWidth && img.naturalHeight) {
              const real = img.naturalWidth / img.naturalHeight;
              if (Math.abs(real - item.ar) / item.ar > 0.01) { item.ar = real; scheduleJustify(); }
            }
          };
          img.addEventListener('load', fixAR);
          if (img.complete && img.naturalWidth) fixAR();
        });

        justifyGrid(grid);
      });

      buildNav(sections);
    }

    /* ─── Loader: espera solo las primeras portadas visibles ─── */
    function runLoader() {
      const loaderName = document.getElementById('loader-name');
      const allImgs = Array.from(document.querySelectorAll('.artist-card img'));
      // Solo esperamos las portadas "eager". Las que tienen loading="lazy"
      // (idx >= 4) pueden no dispararse nunca si quedan fuera de pantalla, y
      // como el loader bloquea el scroll, antes esto podía dejar la pantalla
      // de carga colgada esperando una imagen que el navegador nunca pedía.
      const eagerImgs = allImgs.filter(img => img.loading !== 'lazy').slice(0, 6);
      let loaded = 0, finished = false;

      function setProgress(p) { loaderName.style.setProperty('--p', p + '%'); }

      function finish() {
        if (finished) return;
        finished = true;
        clearTimeout(safety);
        setProgress(100);
        setTimeout(() => {
          document.body.classList.remove('loading');
          const loader = document.getElementById('loader');
          loader.classList.add('hidden');
          setTimeout(() => loader.remove(), 700);
        }, 300);
      }

      function onLoad() {
        loaded++;
        if (eagerImgs.length) setProgress(Math.round((loaded / eagerImgs.length) * 100));
        if (loaded >= eagerImgs.length) finish();
      }

      // Red de seguridad: pase lo que pase (red lenta, imagen que no carga),
      // nunca dejamos el loader más de 4s — las fotos siguen cargando detrás.
      const safety = setTimeout(finish, 4000);

      if (eagerImgs.length === 0) { finish(); return; }

      eagerImgs.forEach(img => {
        if (img.complete && img.naturalWidth > 0) { onLoad(); }
        else { img.addEventListener('load', onLoad); img.addEventListener('error', onLoad); }
      });
    }

    /* ─── About: muestra u oculta la sección según el texto de about.txt ─── */
    function renderAbout(text) {
      const section = document.getElementById('about');
      const p = document.getElementById('aboutText');
      aboutHasText = !!text;
      if (aboutHasText) {
        p.textContent = text;      // textContent (no innerHTML) → seguro ante HTML
        section.hidden = false;
      } else {
        p.textContent = '';
        section.hidden = true;     // vacío o borrado → About oculto
      }
    }

    async function init() {
      document.body.classList.add('loading');
      // Galería y About se piden en paralelo. renderAbout va PRIMERO para que
      // buildNav (dentro de renderSections) ya sepa si debe incluir "About".
      const [sections, aboutText] = await Promise.all([loadSectionsData(), loadAboutText()]);
      renderAbout(aboutText);
      renderSections(sections);
      runLoader();
    }

    init();

    window.scrollTo(0, 0);
    history.scrollRestoration = 'manual';

    /* En celular el nav ocupa dos renglones (nombre + secciones), así que su
       alto es variable. Medimos el nav real y lo guardamos en --nav-space para
       que el contenido y el scroll a cada sección dejen el espacio justo. */
    function syncNavHeight() {
      const navEl = document.querySelector('nav');
      if (navEl) document.documentElement.style.setProperty('--nav-space', navEl.offsetHeight + 'px');
    }
    if (window.ResizeObserver) {
      const navEl = document.querySelector('nav');
      if (navEl) new ResizeObserver(syncNavHeight).observe(navEl);
    }
    window.addEventListener('resize', syncNavHeight);
    window.addEventListener('load', syncNavHeight);

    function logoClick(e) {
      e.preventDefault();
      // Si estamos al final de la página → subir arriba de todo.
      // Si no → bajar al final de todo (el footer/contacto).
      const doc = document.documentElement;
      const scrollY = window.scrollY || window.pageYOffset;
      const maxScroll = doc.scrollHeight - window.innerHeight;
      const atBottom = scrollY >= maxScroll - 4; // margen de 4px por redondeos
      window.scrollTo({ top: atBottom ? 0 : doc.scrollHeight, behavior: 'smooth' });
    }

    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    /* ════════════════════════════════════════════════════════════
       LIGHTBOX — navega SOLO las imágenes del artista/producción
       que se clickeó, e incluye un filmstrip de miniaturas.
       ════════════════════════════════════════════════════════════ */
    let lbImages = [], lbIndex = 0, lbCurrentArtist = null;
    const track = () => document.getElementById('lb-track');
    const imgC  = () => document.getElementById('lightboxImg');
    const imgL  = () => document.getElementById('lb-img-left');
    const imgR  = () => document.getElementById('lb-img-right');
    const lbLoader = () => document.getElementById('lbLoader');

    // Set de URLs cuyo bitmap YA decodificamos al menos una vez. Si una imagen
    // está acá sabemos que pinta al instante (está en caché): la mostramos sin
    // ocultar, así VOLVER a una foto ya vista no parpadea. El precargado de
    // vecinos va "calentando" este set, por eso ir a la siguiente/anterior fluye.
    let lbDecoded = new Set();

    // Spinner — REGLA: si el slot presentado está "cargando" (oculto), se ve el
    // ícono de carga al instante; la pantalla nunca queda en negro pelado. Si la
    // imagen ya está lista, no se muestra nada. Es puramente visual
    // (pointer-events: none) y el token evita carreras al navegar rápido.
    let lbLoadToken = 0;
    function lbWatchLoading(imgEl) {
      const loader = lbLoader();
      if (!loader || !imgEl) return;
      const token = ++lbLoadToken;

      // El spinner sigue el estado real del slot: solo si está marcado cargando.
      if (!imgEl.classList.contains('lb-img-loading')) { loader.classList.remove('show'); return; }
      loader.classList.add('show');

      const finish = () => { if (token === lbLoadToken) loader.classList.remove('show'); };
      if (imgEl.decode) imgEl.decode().then(finish).catch(finish);
      else { imgEl.addEventListener('load', finish, { once: true }); imgEl.addEventListener('error', finish, { once: true }); }
    }

    // Asigna el src de un slot y decide cómo mostrarlo:
    //  • Mismo src (slot ya precargado al que navegamos): no se reasigna → no
    //    re-decodifica ni parpadea.
    //  • Imagen ya vista (en lbDecoded): está en caché y pinta al instante, así
    //    que se muestra SIN ocultar → volver a una foto anterior no parpadea.
    //  • Primera vez: se oculta al instante (nunca se ve la foto anterior) y se
    //    revela recién cuando el bitmap está DECODIFICADO. Mientras tanto el slot
    //    queda "cargando" y lo cubre el spinner — nunca negro pelado.
    function lbLoad(imgEl, src) {
      if (!imgEl) return;
      src = src || '';

      if (imgEl.getAttribute('src') === src) {
        if (src && imgEl.complete && imgEl.naturalWidth) imgEl.classList.remove('lb-img-loading');
        return;
      }

      if (!src) { imgEl.src = ''; imgEl.classList.remove('lb-img-loading'); return; }

      if (lbDecoded.has(src)) {
        imgEl.src = src;
        imgEl.classList.remove('lb-img-loading');
        return;
      }

      imgEl.classList.add('lb-img-loading'); // ocultar al instante (sin fundido)
      imgEl.src = src;
      const reveal = (ok) => {
        if (ok) lbDecoded.add(src);
        if (imgEl.getAttribute('src') === src) imgEl.classList.remove('lb-img-loading');
      };
      if (imgEl.decode) {
        imgEl.decode().then(() => reveal(true)).catch(() => reveal(false));
      } else {
        imgEl.addEventListener('load',  () => reveal(true),  { once: true });
        imgEl.addEventListener('error', () => reveal(false), { once: true });
      }
    }

    function lbUpdateSlides() {
      lbLoad(imgC(), lbImages[lbIndex]);
      lbLoad(imgL(), lbImages[lbIndex - 1]);
      lbLoad(imgR(), lbImages[lbIndex + 1]);
      imgL().style.opacity = lbIndex > 0 ? '1' : '0';
      imgR().style.opacity = lbIndex < lbImages.length - 1 ? '1' : '0';
      document.getElementById('lbPrev').classList.toggle('hidden', lbIndex === 0);
      document.getElementById('lbNext').classList.toggle('hidden', lbIndex === lbImages.length - 1);
      lbUpdateFilmstripActive();
      lbWatchLoading(imgC());
    }

    function lbResetTrack(animate) {
      track().style.transition = animate ? 'transform 0.22s ease' : 'none';
      track().style.transform = 'translateX(-100vw)';
    }

    const isMobile = () => window.matchMedia('(pointer: coarse)').matches;

    function openArtistLightbox(artist) {
      lbImages = artist.images;
      lbIndex = 0;
      lbCurrentArtist = artist;
      document.getElementById('lbTitle').textContent = artist.name;
      lbUpdateSlides();
      lbBuildFilmstrip();
      lbResetTrack(false);
      const lb = document.getElementById('lightbox');
      lb.style.transform = '';
      lb.style.opacity = '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      // Mobile: scroll background NOW while lightbox covers screen
      if (isMobile() && artist.cardEl) {
        artist.cardEl.scrollIntoView({ behavior: 'instant', block: 'center' });
      }
    }

    let lbNavTimeout = null;

    function lbNavBtn(dir) {
      const next = Math.max(0, Math.min(lbImages.length - 1, lbIndex + dir));
      if (next === lbIndex) { lbResetTrack(true); return; }

      if (lbNavTimeout) {
        clearTimeout(lbNavTimeout);
        lbNavTimeout = null;
        track().style.transition = 'none';
        track().style.transform = 'translateX(-100vw)';
        // Update center to current lbIndex so no stale image appears
        lbLoad(imgC(), lbImages[lbIndex]);
      }

      if (dir > 0) { lbLoad(imgR(), lbImages[next]); imgR().style.opacity = '1'; lbWatchLoading(imgR()); }
      else         { lbLoad(imgL(), lbImages[next]); imgL().style.opacity = '1'; lbWatchLoading(imgL()); }

      lbIndex = next;
      document.getElementById('lbPrev').classList.toggle('hidden', lbIndex === 0);
      document.getElementById('lbNext').classList.toggle('hidden', lbIndex === lbImages.length - 1);
      lbUpdateFilmstripActive();

      requestAnimationFrame(() => {
        track().style.transition = 'transform 0.2s ease';
        track().style.transform = dir > 0 ? 'translateX(-200vw)' : 'translateX(0)';
      });

      lbNavTimeout = setTimeout(() => {
        lbUpdateSlides();
        lbResetTrack(false);
        lbNavTimeout = null;
      }, 200);
    }

    /* ─── Filmstrip de miniaturas ─── */
    function lbBuildFilmstrip() {
      const strip = document.getElementById('lb-filmstrip');
      strip.innerHTML = '';
      strip.classList.remove('visible');
      if (lbImages.length <= 1) { strip.classList.add('hidden'); return; }
      strip.classList.remove('hidden');
      lbImages.forEach((src, i) => {
        const t = document.createElement('img');
        t.className = 'lb-thumb' + (i === lbIndex ? ' active' : '');
        t.src = driveThumbUrl(src, 200);
        t.alt = '';
        t.loading = 'lazy';
        t.addEventListener('click', e => {
          e.stopPropagation();
          lbJumpTo(i);
        });
        strip.appendChild(t);
      });
      requestAnimationFrame(lbScrollFilmstripToActive);
      // Animar: sube desde abajo con un pequeño rebote
      requestAnimationFrame(() => requestAnimationFrame(() => strip.classList.add('visible')));
    }

    function lbUpdateFilmstripActive() {
      const thumbs = document.querySelectorAll('#lb-filmstrip .lb-thumb');
      thumbs.forEach((t, i) => t.classList.toggle('active', i === lbIndex));
      lbScrollFilmstripToActive();
    }

    function lbScrollFilmstripToActive() {
      const active = document.querySelector('#lb-filmstrip .lb-thumb.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function lbJumpTo(i) {
      if (i === lbIndex || lbNavTimeout) return;
      lbIndex = i;
      lbUpdateSlides();
      lbResetTrack(false);
    }

    function flashLastCard() {
      if (!lbCurrentArtist || !lbCurrentArtist.cardEl) return;
      const item = lbCurrentArtist.cardEl;
      item.classList.remove('lb-flash');
      void item.offsetWidth; // force reflow to restart animation
      item.classList.add('lb-flash');
      setTimeout(() => item.classList.remove('lb-flash'), 900);
    }

    function closeLightbox(fromSwipe) {
      const lb = document.getElementById('lightbox');
      document.body.style.overflow = '';
      if (!fromSwipe) {
        lb.style.transition = 'opacity 0.18s ease';
        lb.style.opacity = '0';
        setTimeout(() => {
          lb.classList.remove('open');
          lb.style.opacity = '';
          lb.style.transition = '';
          flashLastCard();
        }, 180);
      }
    }

    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox') && !document.getElementById('lightbox').style.cursor) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbNavBtn(-1);
      if (e.key === 'ArrowRight') lbNavBtn(1);
    });

    // ─── Protección de imágenes ───
    // Bloquea clic derecho sobre cards y lightbox
    document.addEventListener('contextmenu', e => {
      if (e.target.closest('.artist-card, .lightbox')) e.preventDefault();
    });
    // Bloquea drag (arrastrar imagen al escritorio o a otra pestaña)
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    // Mouse drag (desktop)
    (function() {
      const lb = document.getElementById('lightbox');
      let startX = 0, startY = 0, axis = null, dragging = false, moved = false;

      lb.addEventListener('mousedown', e => {
        if (e.target.closest('.lightbox-zone') || e.target.closest('.lightbox-close') || e.target.closest('#lb-filmstrip')) return;
        startX = e.clientX;
        startY = e.clientY;
        dragging = true;
        moved = false;
        axis = null;
        track().style.transition = 'none';
        lb.style.transition = 'none';
        lb.style.cursor = 'grabbing';
        e.preventDefault();
      });

      window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (!axis && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
          moved = true;
        }
        if (axis === 'x') {
          const atEdge = (lbIndex === 0 && dx > 0) || (lbIndex === lbImages.length - 1 && dx < 0);
          if (!atEdge) track().style.transform = `translateX(calc(-100vw + ${dx}px))`;
        } else if (axis === 'y') {
          lb.style.transform = `translateY(${dy}px)`;
          lb.style.opacity = Math.max(0, 1 - Math.abs(dy) / 300);
        }
      });

      window.addEventListener('mouseup', e => {
        if (!dragging) return;
        dragging = false;
        lb.style.cursor = '';
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (axis === 'x' && Math.abs(dx) > window.innerWidth * 0.15) {
          lbNavBtn(dx < 0 ? 1 : -1);
        } else if (axis === 'y' && Math.abs(dy) > 100) {
          document.body.style.overflow = '';
          lb.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
          lb.style.transform = `translateY(${dy > 0 ? '100vh' : '-100vh'})`;
          lb.style.opacity = '0';
          setTimeout(() => {
            lb.classList.remove('open');
            lb.style.transform = '';
            lb.style.opacity = '';
            lb.style.transition = '';
            flashLastCard();
          }, 180);
        } else {
          lb.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
          lb.style.transform = '';
          lb.style.opacity = '';
          lbResetTrack(true);
          if (!moved) closeLightbox();
        }
        moved = false;
        axis = null;
      });
    })();

    // Touch: horizontal = carousel, vertical = close
    (function() {
      const lb = document.getElementById('lightbox');
      let startX = 0, startY = 0, axis = null, ignore = false;

      lb.addEventListener('touchstart', e => {
        ignore = !!e.target.closest('#lb-filmstrip');
        if (ignore) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        axis = null;
        track().style.transition = 'none';
        lb.style.transition = 'none';
      }, { passive: true });

      lb.addEventListener('touchmove', e => {
        if (ignore) return;
        e.preventDefault(); // bloquea el scroll del fondo mientras el lightbox está abierto
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (!axis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
          axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        }
        if (axis === 'x') {
          const atEdge = (lbIndex === 0 && dx > 0) || (lbIndex === lbImages.length - 1 && dx < 0);
          if (!atEdge) track().style.transform = `translateX(calc(-100vw + ${dx}px))`;
        } else if (axis === 'y') {
          lb.style.transform = `translateY(${dy}px)`;
          lb.style.opacity = Math.max(0, 1 - Math.abs(dy) / 300);
        }
      }, { passive: false });

      lb.addEventListener('touchend', e => {
        if (ignore) { ignore = false; return; }
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        if (axis === 'x') {
          if (Math.abs(dx) > window.innerWidth * 0.25) {
            lbNavBtn(dx < 0 ? 1 : -1);
          } else {
            lbResetTrack(true);
          }
        } else if (axis === 'y' && Math.abs(dy) > 100) {
          document.body.style.overflow = '';
          lb.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
          lb.style.transform = `translateY(${dy > 0 ? '100vh' : '-100vh'})`;
          lb.style.opacity = '0';
          setTimeout(() => {
            lb.classList.remove('open');
            lb.style.transform = '';
            lb.style.opacity = '';
            flashLastCard();
          }, 180);
        } else {
          lb.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
          lb.style.transform = '';
          lb.style.opacity = '';
          lbResetTrack(true);
        }
      });
    })();
  </script>

</body>
